name = "flyimg"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# R2 存储桶绑定
# 设置环境变量 R2_BUCKET_NAME 后再部署，或在 Dashboard 中手动绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "${R2_BUCKET_NAME}"

# 定时触发器（每小时执行一次清理）
[triggers]
crons = ["0 */1 * * *"]

# 环境变量
# 非敏感配置，也可通过 Dashboard 设置
[vars]
R2_PUBLIC_DOMAIN = "${R2_PUBLIC_DOMAIN}"
CRON_SECRET = "${CRON_SECRET}"
