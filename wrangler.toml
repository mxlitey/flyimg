name = "flyimg"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

# R2 存储桶绑定
# 部署前请修改为你的实际 R2 存储桶名称
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "flyimg-bucket"

# 定时触发器（每小时执行一次清理）
[triggers]
crons = ["0 */1 * * *"]

# 环境变量
# 非敏感变量可直接填写，敏感变量（如 CRON_SECRET）请通过 Cloudflare Dashboard 设置
[vars]
R2_PUBLIC_DOMAIN = "https://pub-xxxx.r2.dev"
EXPIRE_HOURS = "12"
MAX_FILE_SIZE = "20"
MAX_STORAGE_SIZE = "1000"
ALLOWED_TYPES = "image/jpeg,image/png,image/gif,image/webp,image/svg+xml"
