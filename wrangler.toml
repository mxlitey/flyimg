name = "flyimg"
main = "worker.js"
compatibility_date = "2025-02-01"

[assets]
directory = "frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "flyimg"

[[d1_databases]]
binding = "DB"
database_name = "flyimg-db"
database_id = "YOUR_D1_DATABASE_ID"

[triggers]
crons = ["0 */1 * * *"]

[vars]
EXPIRE_HOURS = "12"
MAX_FILE_SIZE = "20"
MAX_STORAGE_SIZE = "1000"
ALLOWED_TYPES = "jpg,png,gif,webp,svg"
R2_PUBLIC_DOMAIN = "YOUR_R2_PUBLIC_DOMAIN"
RENEW_OPTIONS = "3;60;180;360;720"
