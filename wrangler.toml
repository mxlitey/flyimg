name = "flyimg-worker"
main = "worker.js"
compatibility_date = "2025-02-01"
workers_dev = true

# R2 存储桶绑定（固定名称为 flyimg）
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "flyimg"

# 定时触发器（每小时执行一次清理）
[triggers]
crons = ["0 */1 * * *"]

# 环境变量（非敏感配置，有默认值）
[vars]
EXPIRE_HOURS = "12"
MAX_FILE_SIZE = "20"
MAX_STORAGE_SIZE = "1000"
ALLOWED_TYPES = "image/jpeg,image/png,image/gif,image/webp,image/svg+xml"
