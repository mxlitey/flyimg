<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flyimg · 瞬传・瞬用</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155', 600: '#475569' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="config.js"></script>
</head>
<body class="min-h-screen flex flex-col transition-colors duration-300 bg-gradient-to-b from-dark-900 to-dark-800 text-white dark">
  <nav class="sticky top-0 z-50 glass">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="flex items-center">
            <img src="favicon.png" alt="Logo" class="w-10 h-10 mr-3">
            <span class="text-xl font-bold">Flyimg</span>
          </a>
        </div>
        <div class="flex items-center space-x-1 sm:space-x-2">
          <button id="nav-upload" onclick="navigateTo('upload')" class="px-2 sm:px-3 py-2 rounded-lg hover:bg-white/10 transition-colors text-sm">
            <i class="fa fa-cloud-upload sm:mr-1"></i><span class="hidden sm:inline">上传</span>
          </button>
          <button id="nav-my" onclick="navigateTo('my-images')" class="px-2 sm:px-3 py-2 rounded-lg hover:bg-white/10 transition-colors text-sm hidden">
            <i class="fa fa-inbox sm:mr-1"></i><span class="hidden sm:inline">我的</span>
          </button>
          <a href="/admin/" class="px-2 sm:px-3 py-2 rounded-lg hover:bg-white/10 transition-colors text-sm">
            <i class="fa fa-shield sm:mr-1"></i><span class="hidden sm:inline">管理</span>
          </a>
          <a href="https://github.com/mxlitey/flyimg" target="_blank" rel="noopener" class="p-2 rounded-lg hover:bg-white/10 transition-colors" title="GitHub">
            <i class="fa fa-github text-xl"></i>
          </a>
          <button id="theme-toggle" class="p-2 rounded-lg hover:bg-white/10 transition-colors">
            <svg id="theme-icon-moon" class="hidden w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="theme-icon-light" class="hidden w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-4xl mx-auto px-4 py-8 w-full">
    <div id="page-upload">
      <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">瞬传・瞬用</h1>
        <p class="text-xl text-gray-400 max-w-2xl mx-auto">
          无需登录 · <span id="expire-hours-text">12</span>小时自动永久删除 · Cloudflare全球CDN加速
        </p>
      </div>

      <div class="mb-6 flex items-center justify-center space-x-4">
        <label class="text-sm text-gray-400">用户名：</label>
        <input type="text" id="user-tag-input" placeholder="输入用户名（用于查看已传图片）"
          class="theme-input px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm w-72">
      </div>

      <div id="upload-area" class="glass rounded-2xl p-10 mb-8 border-2 border-dashed border-gray-400 hover:border-primary transition-all duration-300 cursor-pointer">
        <div class="text-center">
          <i class="fa fa-cloud-upload text-7xl text-gray-500 mb-6"></i>
          <h2 class="text-2xl font-semibold mb-3">拖拽图片到这里上传</h2>
          <p class="text-gray-400 mb-4">或者点击选择文件，也可以按 Ctrl+V 粘贴剪贴板中的图片</p>
          <p class="text-sm text-gray-500">
            支持 <span id="allowed-types-text">JPG、PNG、GIF、WebP、SVG</span> 格式，最大 <span id="max-size-text">20</span>MB
          </p>
          <input type="file" id="file-input" accept="image/*" class="hidden">
        </div>
      </div>

      <div id="upload-progress" class="hidden glass rounded-2xl p-10 mb-8">
        <div class="flex items-center justify-center mb-4">
          <i class="fa fa-spinner fa-spin text-primary text-3xl mr-4"></i>
          <span class="text-xl font-medium" id="upload-status-text">正在上传...</span>
        </div>
        <div class="w-full bg-gray-700 rounded-full h-3">
          <div id="progress-bar" class="bg-primary h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="upload-status" class="text-sm text-gray-400 mt-3 text-center hidden">正在上传...</p>
      </div>

      <div id="upload-result" class="hidden glass rounded-2xl p-10 mb-8">
        <div class="flex items-center justify-center mb-6">
          <i class="fa fa-check-circle text-success text-3xl mr-4"></i>
          <span class="text-xl font-medium">上传成功！</span>
          <span id="expire-time" class="ml-auto text-sm text-gray-400 bg-primary/20 px-4 py-2 rounded-full"></span>
        </div>

        <div class="mb-8">
          <img id="preview-image" src="" alt="预览" class="max-w-full h-auto rounded-lg mx-auto max-h-80 object-contain shadow-xl">
        </div>

        <div class="space-y-4 text-left">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">直链</label>
            <div class="flex">
              <input type="text" id="direct-link" class="theme-input flex-grow px-4 py-3 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" readonly>
              <button onclick="copyLink('direct-link')" class="bg-primary text-white px-6 py-3 rounded-r-lg hover:bg-primary/90 transition-colors font-medium">复制</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Markdown</label>
            <div class="flex">
              <input type="text" id="markdown-link" class="theme-input flex-grow px-4 py-3 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" readonly>
              <button onclick="copyLink('markdown-link')" class="bg-primary text-white px-6 py-3 rounded-r-lg hover:bg-primary/90 transition-colors font-medium">复制</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">HTML</label>
            <div class="flex">
              <input type="text" id="html-link" class="theme-input flex-grow px-4 py-3 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" readonly>
              <button onclick="copyLink('html-link')" class="bg-primary text-white px-6 py-3 rounded-r-lg hover:bg-primary/90 transition-colors font-medium">复制</button>
            </div>
          </div>
        </div>

        <button onclick="resetUpload()" class="mt-8 w-full bg-gray-700 text-white px-6 py-3 rounded-lg hover:bg-gray-600 transition-colors font-medium">
          <i class="fa fa-upload mr-2"></i>继续上传
        </button>
      </div>
    </div>

    <div id="page-my-images" class="hidden">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold mb-2">我的上传</h1>
        <p class="text-gray-400">用户名：<span id="my-tag-display" class="text-primary font-mono"></span></p>
      </div>
      <div id="my-images-loading" class="text-center py-12 hidden">
        <i class="fa fa-spinner fa-spin text-4xl text-primary mb-4"></i>
        <p class="text-gray-400">加载中...</p>
      </div>
      <div id="my-images-empty" class="text-center py-12 hidden">
        <i class="fa fa-inbox text-6xl text-gray-600 mb-4"></i>
        <p class="text-gray-400 text-lg">暂无文件</p>
        <button onclick="navigateTo('upload')" class="mt-4 bg-primary text-white px-6 py-2 rounded-lg hover:bg-primary/90 transition-colors">去上传</button>
      </div>
      <div id="my-images-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>
  </main>

  <footer class="glass py-6 mt-auto">
    <div class="max-w-4xl mx-auto px-4 text-center text-gray-400">
      <p>Flyimg · 瞬传・瞬用 — 基于 Cloudflare R2 构建</p>
      <p>图片 <span id="footer-expire-hours">12</span> 小时后自动永久删除</p>
    </div>
  </footer>

  <div id="toast" class="fixed bottom-6 right-6 bg-dark-700 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50"></div>

  <script src="js/common.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
