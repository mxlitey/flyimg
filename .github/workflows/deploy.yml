name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Validate Required Secrets
        run: |
          echo "========================================="
          echo "  Flyimg · 瞬传・瞬用 - Deployment Check"
          echo "========================================="
          echo ""
          MISSING=()

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then MISSING+=("CLOUDFLARE_API_TOKEN"); fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then MISSING+=("CLOUDFLARE_ACCOUNT_ID"); fi
          if [ -z "${{ secrets.R2_PUBLIC_DOMAIN }}" ]; then MISSING+=("R2_PUBLIC_DOMAIN"); fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then MISSING+=("CRON_SECRET"); fi

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required GitHub Secrets:"
            echo ""
            for s in "${MISSING[@]}"; do
              echo "  • $s"
            done
            echo ""
            echo "👉 Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "📖 See README.md for detailed setup instructions."
            exit 1
          fi

          echo "✅ All required secrets are configured"
          echo ""

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Wrangler
        run: |
          npm install -g wrangler
          echo "✅ Wrangler $(wrangler --version) installed"

      - name: 🗄️ Setup D1 Database
        id: setup-d1
        run: |
          echo "Checking for existing D1 database 'flyimg-db'..."

          D1_ID=$(curl -sf "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | \
            jq -r '.result[] | select(.name=="flyimg-db") | .uuid' | head -1 || true)

          if [ -n "$D1_ID" ]; then
            echo "✅ Found existing D1 database: $D1_ID"
          else
            echo "Creating new D1 database 'flyimg-db'..."
            CREATE_OUTPUT=$(wrangler d1 create flyimg-db 2>&1 || true)
            D1_ID=$(echo "$CREATE_OUTPUT" | grep -oP 'database_id\s*=\s*"\K[^"]+' || true)

            if [ -z "$D1_ID" ]; then
              echo "::error::Failed to create D1 database."
              echo "Output: $CREATE_OUTPUT"
              echo ""
              echo "Please create it manually in Cloudflare Dashboard or run:"
              echo "  npx wrangler d1 create flyimg-db"
              echo "Then add the database_id to wrangler.toml"
              exit 1
            fi
            echo "✅ Created new D1 database: $D1_ID"
          fi

          echo "database_id=$D1_ID" >> $GITHUB_OUTPUT
          sed -i "s/YOUR_D1_DATABASE_ID/$D1_ID/g" wrangler.toml

      - name: 📊 Execute D1 Migration
        run: |
          wrangler d1 execute flyimg-db --file=migrations/0001_init.sql --remote
          echo "✅ D1 migration completed"

      - name: 🪣 Ensure R2 Bucket
        run: |
          wrangler r2 bucket create flyimg 2>/dev/null || true
          echo "✅ R2 bucket ready"

      - name: 🚀 Deploy Worker
        run: |
          DEPLOY_OUTPUT=$(wrangler deploy 2>&1)
          echo "$DEPLOY_OUTPUT"
          echo "✅ Worker deployed"

      - name: 🔑 Set Worker Secrets
        run: |
          set_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "  ⏭️ $name skipped (empty)"
              return
            fi
            BODY=$(jq -n --arg name "$name" --arg text "$value" '{name: $name, text: $text, type: "secret_text"}')
            curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/flyimg-worker/secrets" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$BODY" && echo "  ✅ $name set" || echo "  ⚠️ $name failed"
          }

          set_secret "R2_PUBLIC_DOMAIN" "${{ secrets.R2_PUBLIC_DOMAIN }}"
          set_secret "CRON_SECRET" "${{ secrets.CRON_SECRET }}"
          set_secret "EXPIRE_HOURS" "${EXPIRE_HOURS_VAL}"
          set_secret "MAX_FILE_SIZE" "${MAX_FILE_SIZE_VAL}"
          set_secret "MAX_STORAGE_SIZE" "${MAX_STORAGE_SIZE_VAL}"
          set_secret "ALLOWED_TYPES" "${ALLOWED_TYPES_VAL}"
          set_secret "CORS_ALLOWED_ORIGINS" "${CORS_ALLOWED_ORIGINS_VAL}"

          echo "✅ Worker secrets configured"
        env:
          EXPIRE_HOURS_VAL: ${{ secrets.EXPIRE_HOURS || '12' }}
          MAX_FILE_SIZE_VAL: ${{ secrets.MAX_FILE_SIZE || '20' }}
          MAX_STORAGE_SIZE_VAL: ${{ secrets.MAX_STORAGE_SIZE || '1000' }}
          ALLOWED_TYPES_VAL: ${{ secrets.ALLOWED_TYPES || 'image/jpeg,image/png,image/gif,image/webp,image/svg+xml' }}
          CORS_ALLOWED_ORIGINS_VAL: ${{ secrets.CORS_ALLOWED_ORIGINS }}

      - name: 📝 Generate Frontend Config
        run: |
          WORKER_URL="${{ secrets.WORKER_URL }}"
          WORKER_URL="${WORKER_URL%/}"

          EXPIRE_HOURS="${{ secrets.EXPIRE_HOURS }}"
          MAX_FILE_SIZE="${{ secrets.MAX_FILE_SIZE }}"
          MAX_STORAGE_SIZE="${{ secrets.MAX_STORAGE_SIZE }}"
          EXPIRE_HOURS_VAL="${EXPIRE_HOURS:-12}"
          MAX_FILE_SIZE_VAL="${MAX_FILE_SIZE:-20}"
          MAX_STORAGE_SIZE_VAL="${MAX_STORAGE_SIZE:-1000}"

          cat > frontend/config.js << CONFIGEOF
          const API_BASE = '${WORKER_URL}';
          const DISPLAY_CONFIG = {
            expireHours: ${EXPIRE_HOURS_VAL},
            maxFileSizeMB: ${MAX_FILE_SIZE_VAL},
            maxStorageSizeMB: ${MAX_STORAGE_SIZE_VAL},
            allowedTypesDisplay: 'JPG、PNG、GIF、WebP、SVG',
          };
          CONFIGEOF
          echo "✅ Frontend config generated with Worker URL: $WORKER_URL"

      - name: 🌐 Setup Pages Project
        run: |
          curl -sf -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"flyimg","production_branch":"main"}' || true
          echo "✅ Pages project configured"

      - name: 📤 Deploy Pages
        id: deploy-pages
        run: |
          DEPLOY_OUTPUT=$(wrangler pages deploy frontend --project-name=flyimg --commit-dirty=true 2>&1)
          echo "$DEPLOY_OUTPUT"

          PAGES_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9_-]+\.pages\.dev' | head -1 || true)
          echo "pages_url=$PAGES_URL" >> $GITHUB_OUTPUT
          echo "✅ Pages deployed: $PAGES_URL"

      - name: 📋 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **All components deployed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| D1 Database (flyimg-db) | ✅ Ready |" >> $GITHUB_STEP_SUMMARY
            echo "| R2 Bucket (flyimg) | ✅ Ready |" >> $GITHUB_STEP_SUMMARY
            echo "| Worker API | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
            echo "| Worker Secrets | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
            echo "| Pages Frontend | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            PAGES_URL="${{ steps.deploy-pages.outputs.pages_url }}"
            WORKER_URL="${{ secrets.WORKER_URL }}"

            echo "### 🔗 Access URLs" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend**: \`${PAGES_URL:-https://flyimg.pages.dev}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Worker API**: \`${WORKER_URL}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Admin Panel**: \`${PAGES_URL:-https://flyimg.pages.dev}/?token=YOUR_CRON_SECRET\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### 📌 Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to Cloudflare Dashboard → Workers → flyimg-worker → copy the Worker URL" >> $GITHUB_STEP_SUMMARY
            echo "2. Update GitHub Secret \`WORKER_URL\` with the actual Worker URL" >> $GITHUB_STEP_SUMMARY
            echo "3. Re-run this workflow to apply the correct frontend config" >> $GITHUB_STEP_SUMMARY
            echo "4. Visit the frontend URL to start using the service" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed.** Check the logs above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔧 Troubleshooting" >> $GITHUB_STEP_SUMMARY
            echo "1. Verify all 5 GitHub Secrets are correctly set" >> $GITHUB_STEP_SUMMARY
            echo "2. Check Cloudflare API token has correct permissions (Workers, D1, R2, Pages)" >> $GITHUB_STEP_SUMMARY
            echo "3. Ensure R2 bucket 'flyimg' has public access enabled" >> $GITHUB_STEP_SUMMARY
            echo "4. Re-run the workflow after fixing issues" >> $GITHUB_STEP_SUMMARY
          fi
