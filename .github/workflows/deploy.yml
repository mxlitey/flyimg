name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_SUBDOMAIN: ${{ secrets.WORKER_SUBDOMAIN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Ensure R2 Bucket
        run: wrangler r2 bucket create flyimg || true

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            R2_PUBLIC_DOMAIN
            CRON_SECRET
            EXPIRE_HOURS
            MAX_FILE_SIZE
            MAX_STORAGE_SIZE
            ALLOWED_TYPES
            CORS_ALLOWED_ORIGINS
        env:
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EXPIRE_HOURS: ${{ secrets.EXPIRE_HOURS }}
          MAX_FILE_SIZE: ${{ secrets.MAX_FILE_SIZE }}
          MAX_STORAGE_SIZE: ${{ secrets.MAX_STORAGE_SIZE }}
          ALLOWED_TYPES: ${{ secrets.ALLOWED_TYPES }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}

      - name: Generate config.js
        run: echo "const API_BASE = 'https://flyimg-worker.${WORKER_SUBDOMAIN}.workers.dev';" > frontend/config.js

      - name: Create Pages Project (if not exists)
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"name":"flyimg","production_branch":"main"}' || true

      - name: Deploy Pages (Frontend)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy frontend --project-name=flyimg --commit-dirty=true
