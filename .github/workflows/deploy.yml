name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Ensure R2 Bucket
        run: wrangler r2 bucket create flyimg || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            R2_PUBLIC_DOMAIN
            CRON_SECRET
        env:
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Replace API_BASE in frontend
        run: |
          sed -i "s|const API_BASE = 'https://your-worker-name.your-account.workers.dev';|const API_BASE = '${{ secrets.WORKER_URL }}';|" frontend/index.html

      - name: Deploy Pages (Frontend)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy frontend --project-name=flyimg
